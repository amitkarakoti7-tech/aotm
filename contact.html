<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="shop.css">
</head>
<body>
    <form action="">
        <div class="form-container">
    <h2>Contact Form</h2>

    <form>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label for="phone">Mobile No</label>
        <input type="number" id="email" placeholder="Enter Mobile No" />
      </div>

      <div class="form-group">
        <label for="option">Choose Courses</label>
        <td>
            <select>
                <option value="Ui Ux">UI UX</option>
                <option value="Graphice desigen">Graphice desigen</option>
                <option value="3D animation">3D animation</option>
                
            </select>
        </td>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="4" placeholder="Write your message"></textarea>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>
    </form>

    
</body>
</html>
